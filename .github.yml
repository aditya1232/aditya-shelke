# The name of the workflow as it appears in the GitHub Actions tab
name: My First Action

# 1. THE EVENT: What triggers this?
on: [push]

# 2. THE JOBS: What should happen?
jobs:
  build-and-greet:
    # This tells GitHub to run the code on a fresh Ubuntu Linux server
    runs-on: ubuntu-latest

    # 3. THE STEPS: The sequence of tasks
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4 # This is a pre-made Action that copies your code to the server

      - name: Run a one-line script
        run: echo "Hello, GitHub Actions is running!"

      - name: Run a multi-line script
        run: |
          echo "Current directory:"
          pwd
          ls -la