# The name of the workflow as it appears in the GitHub Actions tab
name: My First Action

# 1. THE EVENT: What triggers this?
on: [push]

# 2. THE JOBS: What should happen?
jobs:
  build-and-greet:
    # This tells GitHub to run the code on a fresh Ubuntu Linux server
    runs-on: ubuntu-latest

    # 3. THE STEPS: The sequence of tasks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your version

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
